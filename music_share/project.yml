name: MusicShare
options:
  bundleIdPrefix: com.jyq920203.musicshare
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: "U762CH5KUY"

targets:
  MusicShare:
    type: application
    platform: iOS
    sources:
      - path: MusicShare
    settings:
      base:
        INFOPLIST_FILE: MusicShare/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.jyq920203.musicshare
        PRODUCT_NAME: MusicShare
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: ShareExtension
        embed: true

  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
    settings:
      base:
        INFOPLIST_FILE: ShareExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.jyq920203.musicshare.share-extension
        PRODUCT_NAME: ShareExtension
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: ShareExtension/ShareExtension.entitlements

schemes:
  MusicShare:
    build:
      targets:
        MusicShare: all
        ShareExtension: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
